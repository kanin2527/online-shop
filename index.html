<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Hat Try-on</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        #video { transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }

        /* ปุ่มปรับตำแหน่ง */
        #controls {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 99;
        }
        #controls button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 8px 16px;
            border-radius: 20px; cursor: pointer;
            font-size: 14px; backdrop-filter: blur(8px);
        }
        #info {
            position: fixed; top: 10px; left: 10px;
            color: white; font-size: 12px; z-index: 99;
            background: rgba(0,0,0,0.5); padding: 6px 10px;
            border-radius: 6px; font-family: monospace;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>

    <div id="info">Y offset: <span id="yval">1.2</span> | Scale: <span id="sval">5</span></div>
    <div id="controls">
        <button onclick="adjust('y', 0.1)">⬆ ขึ้น</button>
        <button onclick="adjust('y', -0.1)">⬇ ลง</button>
        <button onclick="adjust('s', 0.5)">🔼 ใหญ่</button>
        <button onclick="adjust('s', -0.5)">🔽 เล็ก</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

        const video  = document.getElementById('video');
        const canvas = document.getElementById('output_canvas');
        let faceLandmarker, scene, camera, renderer, hatModel;

        // ── ค่าปรับได้ ──
        let hatYOffset = 1.2;   // เลื่อนหมวกขึ้น/ลง  (บวก = ขึ้น)
        let hatScale   = 5.0;   // ขนาดหมวก

        window.adjust = (type, val) => {
            if (type === 'y') { hatYOffset += val; document.getElementById('yval').textContent = hatYOffset.toFixed(1); }
            if (type === 's') { hatScale   += val; document.getElementById('sval').textContent = hatScale.toFixed(1); }
        };

        // ── Three.js ──
        function initThree() {
            scene    = new THREE.Scene();
            camera   = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);

            scene.add(new THREE.AmbientLight(0xffffff, 2));
            const dir = new THREE.DirectionalLight(0xffffff, 1.5);
            dir.position.set(0, 5, 5);
            scene.add(dir);

            const loader = new THREE.GLTFLoader();
            loader.load('cap.glb', (gltf) => {
                hatModel = gltf.scene;
                hatModel.visible = false;
                scene.add(hatModel);
            });
        }

        // ── MediaPipe ──
        async function initAR() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                outputFacialTransformationMatrixes: true,
                runningMode: "VIDEO",
                numFaces: 1
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.addEventListener('loadeddata', predict);
        }

        // ── Smoothing ──
        const smoothPos  = new THREE.Vector3();
        const smoothQuat = new THREE.Quaternion();
        const smoothScl  = new THREE.Vector3(1,1,1);
        let   smoothInit = false;

        // ── Main loop ──
        let lastTime = -1;
        function predict() {
            requestAnimationFrame(predict);
            if (!faceLandmarker || video.readyState < 2) { renderer.render(scene, camera); return; }
            if (video.currentTime === lastTime)          { renderer.render(scene, camera); return; }
            lastTime = video.currentTime;

            const results = faceLandmarker.detectForVideo(video, performance.now());

            if (results.faceLandmarks?.length > 0 && hatModel) {
                const lm = results.faceLandmarks[0];

                // จุดหลัก: 10 = หน้าผาก, 234/454 = กกหู
                const topHead = lm[10];
                const earL    = lm[234];
                const earR    = lm[454];

                // ความกว้างหน้า (normalized 0-1)
                const faceW = Math.abs(earL.x - earR.x);

                // แปลงพิกัด: landmark (0-1) → Three.js world
                // video ถูก mirror ด้วย CSS scaleX(-1) ต้อง flip X
                const wx = -(topHead.x - 0.5) * 5;          // flip + scale
                const wy = -(topHead.y - 0.5) * 5 + hatYOffset;
                const wz = -topHead.z * 2;

                const s = faceW * hatScale;

                // Target
                const tPos  = new THREE.Vector3(wx, wy, wz);
                const tScl  = new THREE.Vector3(s, s, s);
                let   tQuat = smoothQuat.clone();

                if (results.facialTransformationMatrixes?.length > 0) {
                    const mat4 = new THREE.Matrix4().fromArray(
                        results.facialTransformationMatrixes[0].data
                    );
                    const e = new THREE.Euler().setFromRotationMatrix(mat4, 'XYZ');
                    tQuat = new THREE.Quaternion().setFromEuler(
                        new THREE.Euler(e.x, -e.y, -e.z, 'XYZ')
                    );
                }

                // Smooth (lerp/slerp)
                if (!smoothInit) {
                    smoothPos.copy(tPos); smoothQuat.copy(tQuat); smoothScl.copy(tScl);
                    smoothInit = true;
                } else {
                    smoothPos.lerp(tPos, 0.3);
                    smoothQuat.slerp(tQuat, 0.15);
                    smoothScl.lerp(tScl, 0.25);
                }

                hatModel.position.copy(smoothPos);
                hatModel.quaternion.copy(smoothQuat);
                hatModel.scale.copy(smoothScl);
                hatModel.visible = true;

            } else if (hatModel) {
                hatModel.visible = false;
                smoothInit = false;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThree();
        initAR();
    </script>
</body>
</html>
