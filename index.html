<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Hat Try-on - cap.glb</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        #video { transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const video = document.getElementById('video');
        const canvas = document.getElementById('output_canvas');
        let faceLandmarker, scene, camera, renderer, hatModel;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            scene.add(new THREE.AmbientLight(0xffffff, 2.0)); // เพิ่มความสว่างให้หมวก
            
            const loader = new THREE.GLTFLoader();
            // ใช้ชื่อไฟล์ cap.glb ตามที่คุณระบุ
            loader.load('cap.glb', (gltf) => {
                hatModel = gltf.scene;
                scene.add(hatModel);
                console.log("หมวก cap.glb โหลดสำเร็จ!");
            }, undefined, (error) => {
                console.error("โหลดหมวกไม่ได้: ", error);
            });
        }

        async function initAR() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO"
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.addEventListener('loadeddata', predict);
        }

        async function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks.length > 0 && hatModel) {
                    const landmarks = results.faceLandmarks[0];
                    
                    const noseBridge = landmarks[6];  // ดั้งจมูก
                    const topHead = landmarks[10];    // บนหน้าผาก

                    // ปรับตำแหน่งตามที่คุณแจ้ง: ดึงเข้าหาตัว และ ยกขึ้น
                    hatModel.position.x = -(noseBridge.x - 0.5) * 5;
                    hatModel.position.y = -(topHead.y - 0.5) * 5 + 1.2; // ยกขึ้น 20-30 ซม.
                    hatModel.position.z = -noseBridge.z * 1.5; // ดึงเข้ามาใกล้หน้ามากขึ้น (ลดตัวคูณ)

                    // ปรับขนาดหมวก
                    const faceWidth = Math.abs(landmarks[234].x - landmarks[454].x);
                    hatModel.scale.set(faceWidth * 5, faceWidth * 5, faceWidth * 5);

                    // ปรับการเอียงหมวกตามหัว
                    const eyeLeft = landmarks[33];
                    const eyeRight = landmarks[263];
                    hatModel.rotation.y = Math.atan2(eyeRight.z - eyeLeft.z, eyeRight.x - eyeLeft.x);
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(predict);
        }

        initThree();
        initAR();
    </script>
</body>
</html>
